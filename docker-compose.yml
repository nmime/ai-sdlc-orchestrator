services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orchestrator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-orchestrator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-orchestrator}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: ${POSTGRES_USER:-orchestrator}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_NAME: ${POSTGRES_DB:-orchestrator}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: '200'
      DEFAULT_POOL_SIZE: '20'
      AUTH_TYPE: scram-sha-256
      LISTEN_PORT: '6432'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-orchestrator}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/dynamic-config.yml
      ENABLE_ES: 'true'
      ES_SEEDS: elasticsearch
      ES_VERSION: v8
    volumes:
      - ./docker/temporal-dynamic-config.yml:/etc/temporal/dynamic-config.yml
      - ./docker/temporal-es-cluster-settings-v8.json:/etc/temporal/schema/elasticsearch/visibility/cluster_settings_v8.json
      - ./docker/temporal-es-index-template-v8.json:/etc/temporal/schema/elasticsearch/visibility/index_template_v8.json
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.16.1
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9200/_cluster/health']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-changeme}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      DATABASE_HOST: pgbouncer
      DATABASE_PORT: 6432
      DATABASE_NAME: ${POSTGRES_DB:-orchestrator}
      DATABASE_USER: ${POSTGRES_USER:-orchestrator}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-artifacts}
      MINIO_USE_SSL: 'false'
      E2B_API_KEY: ${E2B_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      API_PORT: 3000
      NODE_ENV: production
      CREDENTIAL_PROXY_URL: http://credential-proxy:4000
      CREDENTIAL_PROXY_INTERNAL_TOKEN: ${CREDENTIAL_PROXY_INTERNAL_TOKEN:-dev-internal-token}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT:-0123456789abcdef}
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      pgbouncer:
        condition: service_started
      temporal:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      DATABASE_HOST: pgbouncer
      DATABASE_PORT: 6432
      DATABASE_NAME: ${POSTGRES_DB:-orchestrator}
      DATABASE_USER: ${POSTGRES_USER:-orchestrator}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-artifacts}
      MINIO_USE_SSL: 'false'
      E2B_API_KEY: ${E2B_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CREDENTIAL_PROXY_URL: http://credential-proxy:4000
      CREDENTIAL_PROXY_INTERNAL_TOKEN: ${CREDENTIAL_PROXY_INTERNAL_TOKEN:-dev-internal-token}
      WORKER_LOG_LEVEL: ${WORKER_LOG_LEVEL:-info}
      NODE_ENV: production
      APP_ROOT: /app
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT:-0123456789abcdef}
    depends_on:
      pgbouncer:
        condition: service_started
      temporal:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  credential-proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile.credential-proxy
    environment:
      DATABASE_HOST: pgbouncer
      DATABASE_PORT: 6432
      DATABASE_NAME: ${POSTGRES_DB:-orchestrator}
      DATABASE_USER: ${POSTGRES_USER:-orchestrator}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      CREDENTIAL_PROXY_PORT: 4000
      CREDENTIAL_PROXY_INTERNAL_TOKEN: ${CREDENTIAL_PROXY_INTERNAL_TOKEN:-dev-internal-token}
      SESSION_SIGNING_KEY: ${SESSION_SIGNING_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT:-0123456789abcdef}
      NODE_ENV: production
    ports:
      - '${CREDENTIAL_PROXY_PORT:-4000}:4000'
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - '${DASHBOARD_PORT:-80}:80'
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  es_data:
  redis_data:
  minio_data:
