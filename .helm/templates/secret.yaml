apiVersion: v1
kind: Secret
metadata:
  name: {{ include "opwerf.fullname" . }}-secrets
  labels:
    {{- include "opwerf.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_PASSWORD: {{ .Values.postgresql.password | default "changeme" | quote }}
  E2B_API_KEY: {{ .Values.e2b.apiKey | default "" | quote }}
  ANTHROPIC_API_KEY: {{ .Values.anthropic.apiKey | default "" | quote }}
  CREDENTIAL_PROXY_SIGNING_KEY: {{ .Values.credentialProxy.signingKey | default "" | quote }}
