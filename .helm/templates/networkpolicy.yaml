{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ai-sdlc.fullname" . }}-api
  labels:
    {{- include "ai-sdlc.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ai-sdlc.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: dashboard
      ports:
        - port: 3000
          protocol: TCP
    - from:
        - namespaceSelector: {}
      ports:
        - port: 3000
          protocol: TCP
  egress:
    - {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ai-sdlc.fullname" . }}-worker
  labels:
    {{- include "ai-sdlc.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ai-sdlc.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ai-sdlc.fullname" . }}-credential-proxy
  labels:
    {{- include "ai-sdlc.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ai-sdlc.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: credential-proxy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: worker
      ports:
        - port: 4000
          protocol: TCP
  egress:
    - {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ai-sdlc.fullname" . }}-dashboard
  labels:
    {{- include "ai-sdlc.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ai-sdlc.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: 80
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api
      ports:
        - port: 3000
          protocol: TCP
{{- end }}
