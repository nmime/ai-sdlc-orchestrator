{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "ai-sdlc.fullname" . }}-api
  labels:
    {{- include "ai-sdlc.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "ai-sdlc.fullname" . }}-api
  minReplicas: {{ .Values.api.replicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas | default 10 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilization | default 70 }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "ai-sdlc.fullname" . }}-worker
  labels:
    {{- include "ai-sdlc.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "ai-sdlc.fullname" . }}-worker
  minReplicas: {{ .Values.worker.replicas }}
  maxReplicas: {{ .Values.autoscaling.workerMaxReplicas | default 8 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilization | default 70 }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "ai-sdlc.fullname" . }}-credential-proxy
  labels:
    {{- include "ai-sdlc.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "ai-sdlc.fullname" . }}-credential-proxy
  minReplicas: {{ .Values.credentialProxy.replicas }}
  maxReplicas: {{ .Values.autoscaling.credentialProxyMaxReplicas | default 4 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilization | default 70 }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "ai-sdlc.fullname" . }}-dashboard
  labels:
    {{- include "ai-sdlc.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "ai-sdlc.fullname" . }}-dashboard
  minReplicas: {{ .Values.dashboard.replicas }}
  maxReplicas: {{ .Values.autoscaling.dashboardMaxReplicas | default 4 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilization | default 70 }}
{{- end }}
