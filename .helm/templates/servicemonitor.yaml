{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "opwerf.fullname" . }}
  labels:
    {{- include "opwerf.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "opwerf.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
{{- end }}
