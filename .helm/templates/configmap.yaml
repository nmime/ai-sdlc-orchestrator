apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "opwerf.fullname" . }}-config
  labels:
    {{- include "opwerf.labels" . | nindent 4 }}
data:
  DATABASE_HOST: {{ .Values.postgresql.host | quote }}
  DATABASE_PORT: {{ .Values.postgresql.port | quote }}
  DATABASE_NAME: {{ .Values.postgresql.database | quote }}
  DATABASE_USER: {{ .Values.postgresql.user | default "orchestrator" | quote }}
  TEMPORAL_ADDRESS: {{ .Values.temporal.address | quote }}
  TEMPORAL_NAMESPACE: {{ .Values.temporal.namespace | quote }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  MINIO_ENDPOINT: {{ .Values.minio.endpoint | quote }}
  MINIO_BUCKET: {{ .Values.minio.bucket | quote }}
  API_PORT: "3000"
  CREDENTIAL_PROXY_PORT: "4000"
  WORKER_LOG_LEVEL: {{ .Values.logLevel | default "info" | quote }}
