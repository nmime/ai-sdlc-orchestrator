    {{- include "opwerf.labels" . | nindent 4 }}
    app.kubernetes.io/component: credential-proxy
spec:
  replicas: {{ .Values.credentialProxy.replicas }}
  selector:
    matchLabels:
      {{- include "opwerf.selectorLabels" . | nindent 6 }}
